<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Contact | Otito Egwuatu</title>
</head>
<body>
    <nav>
        <div class="logo-container">
            <a href="index.html"><img src="logo.png" class="nav-logo" alt="Logo"></a>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="resume.html">Resume</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="page-container" style="display: flex; flex-direction: column; align-items: center; padding-top: 50px;">
        <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center;">
            <h1 style="color: #1a2a6c; margin-bottom: 20px; border-bottom: 2px solid #1a2a6c; padding-bottom: 10px;">Contact Me</h1>
            
            <form style="display:flex; flex-direction:column; gap:12px; margin-bottom: 20px;">
                <input type="text" placeholder="Name" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <input type="email" placeholder="Email" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <textarea placeholder="Message" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; height: 80px;"></textarea>
                <button type="submit" class="btn-bubble" style="background: #2ecc71; border: none; cursor: pointer; color: white;">Send Message</button>
            </form>

            <div style="font-size: 0.9em; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
                <p style="margin: 5px 0;">Email: <a href="mailto:otitoegwuatu05@gmail.com" style="color: #3498db; text-decoration: none;">otitoegwuatu05@gmail.com</a></p>
                <p style="margin: 5px 0;">GitHub: <a href="https://github.com/otitoegwuatu05-spec" target="_blank" style="color: #3498db; text-decoration: none;">otitoegwuatu05-spec</a></p>
            </div>
        </div>
    </div>

    <div id="chat-launcher" onclick="toggleChat()">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/chat-message-sent.png" alt="chat-icon" style="width: 25px;">
    </div>

    <div id="chatbot-container" class="chat-hidden">
        <div id="chatbot-header">
            <div class="header-info" style="display: flex; align-items: center; gap: 10px;">
                <div class="avatar">OE</div>
                <div style="text-align: left;">
                    <div class="bot-name">Otito's Assistant</div>
                    <div class="status" style="color: #2ecc71; font-size: 11px;"><span class="status-dot"></span> Online</div>
                </div>
            </div>
            <div class="close-btn" onclick="toggleChat()" style="color: white; font-size: 24px; cursor: pointer; margin-left: auto;">&times;</div>
        </div>
        
        <div id="chat-window">
            <div class="bot-msg">Hi! 👋 Ask me about Otito's skills, projects, or experience!</div>
            <div id="chat-history"></div>
        </div>

        <div class="chips-container">
            <button class="chip" onclick="sendChip('Skills')">Skills</button>
            <button class="chip" onclick="sendChip('Projects')">Projects</button>
            <button class="chip" onclick="sendChip('GPA')">GPA</button>
            <button class="chip" onclick="sendChip('Experience')">Experience</button>
            <button class="chip" onclick="sendChip('Contact')">Contact</button>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask me anything...">
            <button id="send-btn" onclick="askBot()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
