<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Contact | Otito Egwuatu</title>
</head>
<body>
    <nav></nav>

    <div class="page-container">
        <h1 style="color: #1a2a6c;">Contact Me</h1>
        <form style="display:flex; flex-direction:column; gap:10px; width:300px;">
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <textarea placeholder="Message"></textarea>
            <button type="submit" class="btn-bubble">Send Message</button>
        </form>
    </div>

    <div id="chatbot-container">
        <div id="chatbot-header">Assistant</div>
        <div id="chat-window"><p>Hi! Ask me about my skills or GPA!</p></div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type here...">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="chatbot.js"></script>
</body>
</html>
