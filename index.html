<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Otito Egwuatu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo-container">
            <a href="index.html" class="logo-link">
                <img src="logo.png" alt="Logo" class="nav-logo">
            </a>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="resume.html">Resume</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section id="contact-page" style="padding: 120px 10% 40px; text-align: center;">
        <div class="contact-card" style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto;">
            <h2 style="border-bottom: 2px solid #1a2a6c; padding-bottom: 10px; margin-bottom: 25px;">Contact Me</h2>
            
            <form id="contact-form" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" name="name" placeholder="Name" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px;">
                <input type="email" name="email" placeholder="Email" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px;">
                <textarea name="message" placeholder="Message" rows="5" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
                <button type="submit" style="background-color: #2ecc71; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 150px; align-self: center;">Send</button>
            </form>

            <div style="margin-top: 30px; font-size: 0.9rem;">
                <p>Email: <a href="mailto:otitoegwuatu05@gmail.com">otitoegwuatu05@gmail.com</a></p>
                <p>GitHub: <a href="https://github.com/otitoegwuatu05-spec" target="_blank">otitoegwuatu05-spec</a></p>
            </div>
        </div>
    </section>

    <div id="chat-container">
        <div id="chat-header">Assistant</div>
        <div id="chat-display">Hi! Ask me about my skills!</div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type here...">
            <button id="send-btn" onclick="askBot()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
