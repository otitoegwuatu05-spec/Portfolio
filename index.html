<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#resume">Resume</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home">
        <h1>Hi, I'm [Your Name]</h1>
        <p>Welcome to my professional space.</p>
        <img src="qr-code.png" alt="Scan to visit" width="100">
    </section>

    <section id="resume">
        <h2>Resume</h2>
        <p>Download my latest professional background:</p>
        <a href="resume.pdf" download class="btn">Download Resume (PDF)</a>
    </section>

    <div id="chat-box">
        <div id="chat-header">Portfolio Assistant</div>
        <div id="chat-display">Hi! Ask me about my 'skills', 'projects', or 'experience'.</div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type here...">
            <button onclick="askBot()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
