<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume | Otito Egwuatu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo-container">
            <a href="index.html"><img src="logo.png" class="nav-logo" alt="Logo" style="width: 45px; border-radius: 50%;"></a>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="resume.html">Resume</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="page-container" style="text-align: center; padding-top: 50px;">
        <img src="resume.png" style="width: 350px; height: auto; margin-bottom: 20px; border: 4px solid #1a2a6c; box-shadow: 0 4px 15px rgba(0,0,0,0.2);" alt="Resume Preview">
        
        <h1 style="color: #1a2a6c;">Resume</h1>
        <p>Experience in IT Support and Network Security</p>
        
        <div style="margin-top: 30px;">
            <a href="Otito_Resume.pdf" target="_blank" class="btn-bubble">
                View / Download Resume (PDF)
            </a>
        </div>
    </div>

    <div id="chat-launcher" onclick="toggleChat()">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/chat-message-sent.png" alt="chat-icon" style="width: 25px;">
    </div>

    <div id="chatbot-container" class="chat-hidden">
        <div id="chatbot-header">
            <div class="header-info" style="display: flex; align-items: center; gap: 10px;">
                <div class="avatar">OE</div>
                <div style="text-align: left;">
                    <div class="bot-name">Otito's Assistant</div>
                    <div class="status" style="color: #2ecc71; font-size: 11px;"><span class="status-dot"></span> Online</div>
                </div>
            </div>
            <div class="close-btn" onclick="toggleChat()" style="color: white; font-size: 24px; cursor: pointer; margin-left: auto;">&times;</div>
        </div>
        
        <div id="chat-window">
            <div class="bot-msg">Hi! 👋 Ask me about Otito's skills, projects, or experience!</div>
            <div id="chat-history"></div>
        </div>

        <div class="chips-container">
            <button class="chip" onclick="sendChip('Skills')">Skills</button>
            <button class="chip" onclick="sendChip('Projects')">Projects</button>
            <button class="chip" onclick="sendChip('GPA')">GPA</button>
            <button class="chip" onclick="sendChip('Experience')">Experience</button>
            <button class="chip" onclick="sendChip('Contact')">Contact</button>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask me anything...">
            <button id="send-btn" onclick="askBot()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
